<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 - Real-time Log</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
        }
        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 0.3rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .sub { text-align: center; color: #bbb; margin-bottom: 2rem; font-size: 0.9rem; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.95rem; color: #ddd; }
        input[type="text"], input[type="url"], select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: none;
            border-radius: 60px;
            background: #f0f2f5;
            color: #111;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus { box-shadow: 0 0 0 3px #6c63ff; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c63ff, #4a3fcf);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
        #status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.4);
            transition: 0.2s;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #logLine {
            font-size: 0.85rem;
            color: #8f8;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 10px;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 15px;
            text-align: center;
            border-top: 1px solid #444;
            padding-top: 15px;
        }
        .info span { color: #6c63ff; font-weight: 600; }
        .badge {
            display: inline-block;
            background: #6c63ff40;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #ccc;
            margin-left: 8px;
        }
        small { color: #aaa; font-size: 0.7rem; }
        a { color: #6c63ff; text-decoration: underline; }
        a:hover { color: #8f88ff; }
    </style>
</head>
<body>
<div class="card">
    <h1>
        🎵 YouTube to MP3 Converter
    </h1>
    <div class="sub">Proses real-time dengan SSE</div>

    <form id="downloadForm">
        <div class="input-group">
            <label for="urlInput">🔗 URL YouTube</label>
            <input type="url" id="urlInput" placeholder="Tempel link YouTube di sini ..." required>
        </div>

        <div class="input-group">
            <label for="visitorData">🆔 Visitor Data (opsional)</label>
            <input type="text" id="visitorData" placeholder="VISITOR_INFO1_LIVE=...">
            <small>
                📖 <a href="/panduan" target="_blank">Panduan untuk mendapatkan Visitor Data</a>
            </small>
        </div>

        <div class="input-group">
            <label for="qualitySelect">🎚️ Pilih Kualitas Audio</label>
            <select id="qualitySelect">
                <option value="128">128 kbps</option>
                <option value="192" selected>192 kbps</option>
                <option value="256">256 kbps</option>
                <option value="320">320 kbps</option>
            </select>
        </div>

        <button type="submit" id="downloadBtn">⬇️  Konversi & Unduh  ⬇️</button>
        <div id="status">
            <span id="statusText">✨ Siap menerima URL</span>
            <div id="logLine"></div>
        </div>
    </form>

    <div class="info">
        ⚡ JS Runtime: <span id="jsRuntime">{{ js_runtime if js_runtime else 'Tidak terdeteksi' }}</span> &nbsp;|&nbsp;
        🔄 Menggunakan Visitor Data + Android/ios client
    </div>
</div>

<script>
    const form = document.getElementById('downloadForm');
    const urlInput = document.getElementById('urlInput');
    const visitorData = document.getElementById('visitorData');
    const qualitySelect = document.getElementById('qualitySelect');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusText = document.getElementById('statusText');
    const logLine = document.getElementById('logLine');

    let eventSource = null;

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = urlInput.value.trim();
        if (!url) {
            statusText.innerHTML = '❌ Masukkan URL YouTube.';
            statusText.style.background = '#ff475750';
            return;
        }
        if (!url.includes('youtube.com/watch') && !url.includes('youtu.be/')) {
            statusText.innerHTML = '⚠️ URL tidak valid.';
            statusText.style.background = '#ffaa3350';
            return;
        }

        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<div class="loader"></div> Memproses ...';
        statusText.innerHTML = '🔄 Memulai proses ...';
        statusText.style.background = '#2196f350';
        logLine.textContent = '';

        const formData = new FormData();
        formData.append('url', url);
        formData.append('quality', qualitySelect.value);
        if (visitorData.value.trim()) {
            formData.append('visitor_data', visitorData.value.trim());
        }

        try {
            const response = await fetch('/download', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || 'Gagal memulai proses');
            }
            const data = await response.json();
            const taskId = data.task_id;

            if (eventSource) eventSource.close();
            eventSource = new EventSource(`/progress/${taskId}`);

            eventSource.onmessage = (event) => {
                const msg = event.data;
                logLine.textContent = msg;

                if (msg === 'DONE_SUCCESS') {
                    eventSource.close();
                    statusText.innerHTML = '✅ Selesai! Mengunduh file...';
                    statusText.style.background = '#4caf5050';
                    window.location.href = `/download_file/${taskId}`;
                    setTimeout(() => {
                        downloadBtn.disabled = false;
                        downloadBtn.innerHTML = '⬇️  Konversi & Unduh  ⬇️';
                        statusText.innerHTML = '✨ Siap menerima URL lagi';
                        statusText.style.background = 'rgba(0,0,0,0.4)';
                        logLine.textContent = '';
                    }, 2000);
                } else if (msg === 'DONE_ERROR') {
                    eventSource.close();
                    statusText.innerHTML = '❌ Proses gagal. Cek log.';
                    statusText.style.background = '#ff475750';
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = '⬇️  Konversi & Unduh  ⬇️';
                } else {
                    statusText.innerHTML = '🔄 Sedang memproses ...';
                }
            };

            eventSource.onerror = (err) => {
                console.error('SSE error:', err);
                eventSource.close();
                if (statusText.innerHTML.includes('Selesai')) return;
                statusText.innerHTML = '⚠️ Koneksi terputus, coba lagi.';
                statusText.style.background = '#ffaa3350';
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '⬇️  Konversi & Unduh  ⬇️';
            };

        } catch (err) {
            console.error(err);
            statusText.innerHTML = `❌ Error: ${err.message}`;
            statusText.style.background = '#ff475750';
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '⬇️  Konversi & Unduh  ⬇️';
        }
    });
</script>
</body>
</html>
